name: Sync buildings.csv to Notion

on:
  push:
    branches:
      - main
    paths:
      - 'data/buildings.csv'

  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  validate-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate buildings.csv
        run: python scripts/validate_csv.py data/buildings.csv

      - name: Sync to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python scripts/sync_buildings_to_notion.py
